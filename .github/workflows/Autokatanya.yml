name: Hardcore Smart Downloader (Anti 7KB)

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: "Masukkan direct file URL"
        required: true
      drive_path:
        description: "Folder tujuan Google Drive"
        required: true
        default: "hardcore-download"

jobs:
  download-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1️⃣ Install dependencies
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl wget ffmpeg aria2
          curl https://rclone.org/install.sh | sudo bash

      # 2️⃣ Setup rclone
      - name: Setup rclone
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONF_B64 }}" | base64 -d > ~/.config/rclone/rclone.conf

      # 3️⃣ Hardcore Download
      - name: Download File (Anti Bot Mode)
        run: |
          mkdir -p downloads
          URL="${{ github.event.inputs.file_url }}"
          FILENAME=$(basename "$URL")

          echo "Attempt 1: aria2 (IDM style multi-connection)..."

          aria2c \
            -x 16 -s 16 -k 1M \
            --header="User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/122.0 Safari/537.36" \
            --header="Referer: https://qu.ax/" \
            -d downloads \
            -o "$FILENAME" \
            "$URL" \
            2>&1 | tee download.log

          FILEPATH="downloads/$FILENAME"

          # Cek ukuran file
          if [ -f "$FILEPATH" ]; then
            SIZE=$(stat -c%s "$FILEPATH")
          else
            SIZE=0
          fi

          echo "Downloaded size: $SIZE bytes"

          # Kalau <1MB anggap gagal (kemungkinan HTML)
          if [ "$SIZE" -lt 1000000 ]; then
            echo "File terlalu kecil. Fallback ke CURL..."

            curl -L \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/122.0 Safari/537.36" \
              -H "Accept: */*" \
              -H "Referer: https://qu.ax/" \
              -o "$FILEPATH" \
              "$URL" \
              2>&1 | tee -a download.log

            SIZE=$(stat -c%s "$FILEPATH")
            echo "New size: $SIZE bytes"
          fi

          # Validasi final
          if [ "$SIZE" -lt 1000000 ]; then
            echo "ERROR: File masih terlalu kecil. Kemungkinan diblok server."
            exit 1
          fi

          echo "FINAL_FILE=$FILEPATH" >> $GITHUB_ENV
          echo "FILE_NAME=$FILENAME" >> $GITHUB_ENV

      # 4️⃣ Upload ke Google Drive
      - name: Upload to Google Drive
        run: |
          rclone copy "$FINAL_FILE" \
            "gdrive:/${{ github.event.inputs.drive_path }}/" \
            --progress \
            2>&1 | tee rclone.log

      # 5️⃣ Kirim log ke Telegram
      - name: Send Log to Telegram
        if: always()
        run: |
          LOG_CONTENT=$(tail -n 20 download.log rclone.log 2>/dev/null | sed 's/"/\\"/g')

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TG_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="📄 <b>Hardcore Downloader Log</b>%0A%0A<pre>${LOG_CONTENT}</pre>"

      # SUCCESS
      - name: Telegram SUCCESS
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TG_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="✅ <b>SUCCESS</b>%0A📁 <code>${FILE_NAME}</code>%0A📂 <code>${{ github.event.inputs.drive_path }}</code>"

      # FAILED
      - name: Telegram FAILED
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TG_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="❌ <b>FAILED</b>%0A🔗 <code>${{ github.event.inputs.file_url }}</code>"
