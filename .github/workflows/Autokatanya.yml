name: Smart Auto Scraper Downloader

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: "Masukkan URL (mp4 / m3u8 / halaman download)"
        required: true
      drive_path:
        description: "Folder tujuan Google Drive"
        required: true
        default: "auto-smart"

jobs:
  smart-download:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1️⃣ Install dependencies
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl wget ffmpeg grep sed
          curl https://rclone.org/install.sh | sudo bash

      # 2️⃣ Setup rclone
      - name: Setup rclone
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONF_B64 }}" | base64 -d > ~/.config/rclone/rclone.conf

      # 3️⃣ Smart Detect + Scrape
      - name: Detect & Process URL
        run: |
          mkdir -p downloads
          URL="${{ github.event.inputs.file_url }}"

          echo "Checking Content-Type..."
          CONTENT_TYPE=$(curl -L -s -o /dev/null -w "%{content_type}" "$URL")
          echo "Content-Type: $CONTENT_TYPE"

          FINAL_URL="$URL"

          # Jika HTML, coba scrape mp4 atau m3u8
          if [[ "$CONTENT_TYPE" == *"text/html"* ]]; then
            echo "HTML detected. Attempting to scrape..."

            PAGE=$(curl -L -s "$URL")

            # Cari mp4
            SCRAPED=$(echo "$PAGE" | grep -oE 'https?://[^"]+\.mp4')

            # Kalau tidak ada mp4, cari m3u8
            if [[ -z "$SCRAPED" ]]; then
              SCRAPED=$(echo "$PAGE" | grep -oE 'https?://[^"]+\.m3u8')
            fi

            if [[ -z "$SCRAPED" ]]; then
              echo "ERROR: Tidak ditemukan mp4 atau m3u8 di halaman."
              exit 1
            fi

            FINAL_URL="$SCRAPED"
            echo "Scraped URL: $FINAL_URL"
          fi

          # Detect ekstensi
          if [[ "$FINAL_URL" == *.m3u8* ]]; then
            echo "Detected m3u8 stream"
            FILENAME="stream_output.mp4"

            ffmpeg -y \
              -i "$FINAL_URL" \
              -c copy \
              downloads/$FILENAME \
              2>&1 | tee download.log

          elif [[ "$FINAL_URL" == *.mp4* ]]; then
            echo "Detected direct mp4 file"
            FILENAME=$(basename "$FINAL_URL")

            curl -L \
              -H "User-Agent: Mozilla/5.0" \
              "$FINAL_URL" \
              -o downloads/$FILENAME \
              2>&1 | tee download.log
          else
            echo "ERROR: Format tidak didukung."
            exit 1
          fi

          echo "FINAL_FILE=downloads/$FILENAME" >> $GITHUB_ENV
          echo "FILE_NAME=$FILENAME" >> $GITHUB_ENV

      # 4️⃣ Upload ke Google Drive
      - name: Upload to Google Drive
        run: |
          rclone copy "$FINAL_FILE" \
            "gdrive:/${{ github.event.inputs.drive_path }}/" \
            --progress \
            2>&1 | tee rclone.log

      # 5️⃣ Kirim log ke Telegram
      - name: Send Log to Telegram
        if: always()
        run: |
          LOG_CONTENT=$(tail -n 20 download.log rclone.log 2>/dev/null | sed 's/"/\\"/g')

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TG_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="📄 <b>Smart Downloader Log</b>%0A%0A<pre>${LOG_CONTENT}</pre>"

      # SUCCESS
      - name: Telegram SUCCESS
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TG_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="✅ <b>SUCCESS</b>%0A📁 <code>${FILE_NAME}</code>%0A📂 <code>${{ github.event.inputs.drive_path }}</code>"

      # FAILED
      - name: Telegram FAILED
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TG_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="❌ <b>FAILED</b>%0A🔗 <code>${{ github.event.inputs.file_url }}</code>"
