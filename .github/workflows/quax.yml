name: QuAx Range Downloader

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: "Masukkan URL file (contoh: https://qu.ax/x/xxxxx.mp4)"
        required: true
      referer_url:
        description: "Masukkan Referer (contoh: https://qu.ax/xxxxx)"
        required: true
      drive_path:
        description: "Folder Google Drive"
        required: true
        default: "range-download"

jobs:
  download-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 curl
          curl https://rclone.org/install.sh | sudo bash

      - name: Setup rclone
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONF_B64 }}" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Download using aria2 (Range mode)
        run: |
          mkdir -p downloads
          URL="${{ github.event.inputs.file_url }}"
          REFERER="${{ github.event.inputs.referer_url }}"
          FILENAME=$(basename "$URL")

          aria2c \
            -x 16 -s 16 -k 1M \
            --header="Referer: $REFERER" \
            --header="User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/145.0 Safari/537.36" \
            --header="Accept: */*" \
            --file-allocation=none \
            -d downloads \
            -o "$FILENAME" \
            "$URL" \
            2>&1 | tee download.log

          FILEPATH="downloads/$FILENAME"
          SIZE=$(stat -c%s "$FILEPATH")

          echo "Downloaded size: $SIZE bytes"

          if [ "$SIZE" -lt 1000000 ]; then
            echo "ERROR: Download gagal atau diblok."
            exit 1
          fi

          echo "FINAL_FILE=$FILEPATH" >> $GITHUB_ENV
          echo "FILE_NAME=$FILENAME" >> $GITHUB_ENV

      - name: Upload to Google Drive
        run: |
          rclone copy "$FINAL_FILE" \
            "gdrive:/${{ github.event.inputs.drive_path }}/" \
            --progress \
            2>&1 | tee rclone.log

      - name: Telegram SUCCESS
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TG_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="✅ SUCCESS%0A📁 ${FILE_NAME}"

      - name: Telegram FAILED
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TG_CHAT_ID }}" \
            -d text="❌ FAILED"
